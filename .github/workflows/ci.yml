name: Project Quality Control (CI)

# 1. THE TRIGGER: When does this pipeline run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # Also runs if you create a PR to merge into main

jobs:
  # JOB 1: Test the NestJS Code
  test-nestjs-code:
    runs-on: ubuntu-latest

    steps:
    - name: Download code from GitHub
      uses: actions/checkout@v4

    - name: Set up Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20.x' # Matches the version in your Dockerfile

    - name: Install Dependencies
      run: npm ci # 'npm ci' is strictly for automated environments (faster than npm install)

    - name: Verify Code Compiles (Build)
      run: npm run build

    # If you have unit tests set up in NestJS, uncomment the line below!
    # - name: Run Automated Tests
    #   run: npm run test

  # JOB 2: Test the Dockerfile
  test-docker-build:
    needs: test-nestjs-code # Wait for Job 1 to finish successfully before starting Job 2
    runs-on: ubuntu-latest

    steps:
    - name: Download code from GitHub
      uses: actions/checkout@v4

    - name: Dry Run Docker Build
      # This builds the image just to prove it works, but doesn't save or deploy it anywhere
      run: docker build -t my-app-test:latest .